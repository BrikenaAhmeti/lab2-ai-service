services:
  ai-service:
    build:
      context: .
      target: development
    container_name: medsphere-ai-service
    environment:
      NODE_ENV: development
      PORT: 3010
      MONGODB_URI: mongodb://mongodb:27017/medsphere_ai
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4o}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      CORE_SERVICE_URL: ${CORE_SERVICE_URL_DOCKER:-http://host.docker.internal:4000}
      MAX_AUDIO_FILE_SIZE_MB: ${MAX_AUDIO_FILE_SIZE_MB:-25}
    ports:
      - "${PORT:-3010}:3010"
    volumes:
      - .:/app
      - ai_service_node_modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3010/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: medsphere-ai-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medsphere-ai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  ai_service_node_modules:
  mongodb_data:
  redis_data:
